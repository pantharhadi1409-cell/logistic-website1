<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | NEXUS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <nav>
        <a href="index.html" class="logo">NEXUS</a>
        <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="cart.html" class="cart-icon-container">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="cart-badge">0</span>
            </a>
        </div>
    </nav>

    <header class="page-header">
        <h1>LET'S <span>CONNECT</span></h1>
        <p>Questions about an order or our products? Reach out.</p>
    </header>

    <section class="section">
        <div class="contact-container">
            <div class="reveal">
                <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Customer <br><span style="color: var(--accent-1);">Support</span></h2>
                <p style="color: var(--text-secondary); margin-bottom: 40px;">Fill out the form and our support team will get back to you within 24 hours.</p>
                
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <i class="fas fa-envelope" style="color: var(--accent-1); font-size: 1.5rem; margin-right: 20px; width: 30px;"></i>
                    <p>support@nexus.store</p>
                </div>
            </div>
            <div class="reveal" style="transition-delay: 0.2s;">
                <form class="card">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="How can we help?" required></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 NEXUS Store. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
